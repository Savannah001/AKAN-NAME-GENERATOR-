<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akan Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">
        <span class="text-white">Discover Your</span><br>
        <span class="text-gold">Akan Name</span>
      </h1>
      <p class="header-subtitle">
        In Akan culture, children are named based on the day they were born. Enter your birthdate and gender to find yours.
      </p>
    </header>

    <!-- Form Card -->
    <div class="card">
      <form id="akanForm" novalidate>
        <!-- Birthdate -->
        <div class="form-group">
          <label class="label">Your Birthdate</label>
          <div class="date-grid">
            <div>
              <label for="day" class="sub-label">Day</label>
              <input type="number" id="day" name="day" min="1" max="31" placeholder="DD" class="input-field">
            </div>
            <div>
              <label for="month" class="sub-label">Month</label>
              <input type="number" id="month" name="month" min="1" max="12" placeholder="MM" class="input-field">
            </div>
            <div>
              <label for="year" class="sub-label">Year</label>
              <input type="number" id="year" name="year" min="1900" max="2100" placeholder="YYYY" class="input-field">
            </div>
          </div>
          <p id="dateError" class="error-text"></p>
        </div>

        <!-- Gender -->
        <div class="form-group">
          <label class="label">Select Gender</label>
          <div class="gender-grid">
            <label class="gender-option">
              <input type="radio" name="gender" value="male" class="sr-only">
              <div class="gender-card">Male</div>
            </label>
            <label class="gender-option">
              <input type="radio" name="gender" value="female" class="sr-only">
              <div class="gender-card">Female</div>
            </label>
          </div>
          <p id="genderError" class="error-text">Please select a gender</p>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="submit-btn">
          Find My Akan Name
        </button>
      </form>

      <!-- Result -->
      <div id="resultSection" class="result-section">
        <p class="result-label">You were born on a</p>
        <p id="bornDay" class="result-day"></p>
        <p id="akanNameResult" class="result-name"></p>
        <p id="meaningText" class="result-meaning"></p>
        <button id="resetBtn" class="reset-btn">← Try another date</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Akan Name Generator — Celebrating Ghanaian Heritage 🇬🇭</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
